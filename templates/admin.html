<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel FAQ Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
      --text: #e8e8e8; --muted: #666;
      --danger: #ff4d4d; --danger-dim: rgba(255,77,77,0.1);
      --radius: 10px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 720px; margin: 0 auto; }
    header { margin-bottom: 48px; }
    header h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.03em; }
    header h1 span { color: var(--accent); }
    header p { margin-top: 6px; color: var(--muted); font-size: 0.9rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; }
    .card h2 { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 20px; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input[type="text"], select {
      flex: 1; min-width: 160px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; padding: 10px 14px; outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    select option { background: #1a1a1a; }
    button { cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; border: none; border-radius: 8px; padding: 10px 18px; transition: opacity 0.2s, transform 0.1s; }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #0f0f0f; }
    .btn-danger  { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,77,77,0.2); padding: 6px 12px; font-size: 0.8rem; }
    .btn-secondary { background: #2a2a2a; color: var(--text); }

    /* Modelo selector */
    .modelo-row { display: flex; gap: 10px; align-items: center; }
    .modelo-row select { flex: 1; }
    .modelo-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-dim); border: 1px solid rgba(0,229,160,0.2);
      color: var(--accent); border-radius: 20px; padding: 4px 10px;
      font-size: 0.75rem; font-weight: 500; margin-top: 10px;
    }
    .modelo-badge::before { content: "●"; font-size: 0.6rem; }

    .url-list { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
    .url-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .url-info { min-width: 0; }
    .url-info .nome { font-size: 0.875rem; font-weight: 500; margin-bottom: 2px; }
    .url-info .link { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 480px; }
    .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 0.875rem; }

    .messages { display: flex; flex-direction: column; gap: 12px; min-height: 120px; max-height: 320px; overflow-y: auto; margin-bottom: 16px; padding-right: 4px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 10px; font-size: 0.875rem; line-height: 1.55; animation: fadeIn 0.2s ease; }
    .msg.user  { align-self: flex-end; background: var(--accent-dim); border: 1px solid rgba(0,229,160,0.2); }
    .msg.bot   { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
    .msg.bot.loading { color: var(--muted); font-style: italic; }
    .msg-meta  { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

    .chat-input { display: flex; gap: 10px; }
    .chat-input input { flex: 1; }
    .status { font-size: 0.78rem; margin-top: 8px; min-height: 18px; color: var(--muted); }
    .status.ok   { color: var(--accent); }
    .status.erro { color: var(--danger); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>FAQ <span>Bot</span></h1>
    <p>Painel de administração — gerencie as URLs e teste o atendimento</p>
  </header>

  <!-- Modelo -->
  <div class="card">
    <h2>Modelo de IA</h2>
    <div class="modelo-row">
      <select id="select-modelo" onchange="salvarModelo()"></select>
    </div>
    <div id="modelo-atual" class="modelo-badge">carregando...</div>
  </div>

  <!-- Adicionar URL -->
  <div class="card">
    <h2>Adicionar página de política</h2>
    <div class="form-row">
      <input type="text" id="nome" placeholder="Nome (ex: Política de Troca)"/>
      <input type="text" id="url"  placeholder="https://sualoja.com.br/politica-de-troca"/>
      <button class="btn-primary" onclick="adicionarUrl()">Adicionar</button>
    </div>
    <div class="status" id="status-add"></div>
  </div>

  <!-- Lista URLs -->
  <div class="card">
    <h2>Páginas cadastradas</h2>
    <div class="url-list" id="url-list">
      <div class="empty">Nenhuma URL cadastrada ainda.</div>
    </div>
  </div>

  <!-- Chat de teste -->
  <div class="card">
    <h2>Testar atendimento</h2>
    <div class="messages" id="messages">
      <div class="msg bot">Olá! Faça uma pergunta para testar o bot.</div>
    </div>
    <div class="chat-input">
      <input type="text" id="pergunta" placeholder="Digite uma pergunta do cliente..." onkeydown="if(event.key==='Enter') enviar()"/>
      <button class="btn-primary" onclick="enviar()">Enviar</button>
    </div>
  </div>

</div>
<script>
  let modeloAtual = "sabia-4";

  async function carregarConfig() {
    const res  = await fetch("/config");
    const data = await res.json();
    modeloAtual = data.modelo;

    const sel = document.getElementById("select-modelo");
    sel.innerHTML = "";
    for (const [valor, label] of Object.entries(data.modelos)) {
      const opt = document.createElement("option");
      opt.value = valor;
      opt.textContent = label;
      if (valor === data.modelo) opt.selected = true;
      sel.appendChild(opt);
    }

    atualizarBadge(data.modelo, data.modelos);
  }

  function atualizarBadge(modelo, modelos) {
    const badge = document.getElementById("modelo-atual");
    const nome  = modelos ? modelos[modelo] : modelo;
    badge.textContent = nome ? nome.split("—")[0].trim() : modelo;
  }

  async function salvarModelo() {
    const modelo = document.getElementById("select-modelo").value;
    const res    = await fetch("/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ modelo }),
    });
    if (res.ok) {
      modeloAtual = modelo;
      const sel   = document.getElementById("select-modelo");
      const label = sel.options[sel.selectedIndex].text;
      document.getElementById("modelo-atual").textContent = label.split("—")[0].trim();
    }
  }

  async function carregarUrls() {
    const res  = await fetch("/urls");
    const urls = await res.json();
    const list = document.getElementById("url-list");
    if (!urls.length) {
      list.innerHTML = '<div class="empty">Nenhuma URL cadastrada ainda.</div>';
      return;
    }
    list.innerHTML = urls.map((u, i) => `
      <div class="url-item" id="url-${i}">
        <div class="url-info">
          <div class="nome">${u.nome}</div>
          <div class="link">${u.url}</div>
        </div>
        <button class="btn-danger" onclick="removerUrl(${i})">Remover</button>
      </div>
    `).join("");
  }

  async function adicionarUrl() {
    const nome   = document.getElementById("nome").value.trim();
    const url    = document.getElementById("url").value.trim();
    const status = document.getElementById("status-add");
    if (!nome || !url) { status.textContent = "Preencha o nome e a URL."; status.className = "status erro"; return; }
    const res = await fetch("/urls", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome, url }),
    });
    if (res.ok) {
      document.getElementById("nome").value = "";
      document.getElementById("url").value  = "";
      status.textContent = "URL adicionada com sucesso!"; status.className = "status ok";
      carregarUrls();
    } else { status.textContent = "Erro ao adicionar URL."; status.className = "status erro"; }
    setTimeout(() => { status.textContent = ""; status.className = "status"; }, 3000);
  }

  async function removerUrl(index) {
    await fetch(`/urls/${index}`, { method: "DELETE" });
    carregarUrls();
  }

  async function enviar() {
    const input    = document.getElementById("pergunta");
    const msgs     = document.getElementById("messages");
    const pergunta = input.value.trim();
    if (!pergunta) return;
    input.value = "";

    msgs.innerHTML += `<div class="msg user">${pergunta}</div>`;
    const loadId = "load-" + Date.now();
    msgs.innerHTML += `<div class="msg bot loading" id="${loadId}">Digitando…</div>`;
    msgs.scrollTop = msgs.scrollHeight;

    const res  = await fetch("/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pergunta }),
    });
    const data = await res.json();
    document.getElementById(loadId).remove();

    const modelo = data.modelo_usado || modeloAtual;
    msgs.innerHTML += `
      <div class="msg bot">
        ${data.resposta || data.erro}
        <div class="msg-meta">via ${modelo}</div>
      </div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }

  carregarConfig();
  carregarUrls();
</script>
</body>
</html>
